name: Weekly data collection

on:
  workflow_dispatch:
    inputs:
      download_limit:
        description: "Maximum number of public source files to download"
        required: false
        default: "220"
      include_vote_pdfs:
        description: "Include vote result PDFs. Keep true for BlackRock; set false if free-minute usage grows."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      edinet_from:
        description: "EDINET 検索開始日。例: 2025-06-01。空白 = 90日前（3月決算は6〜8月提出）"
        required: false
        default: ""
      edinet_to:
        description: "EDINET 検索終了日。例: 2025-08-31。空白 = 今日"
        required: false
        default: ""
      edinet_company:
        description: "特定企業のみ取得する場合の証券コード。例: 7203。空白 = 全登録企業"
        required: false
        default: ""
      edinet_limit:
        description: "今回追加する有価証券報告書の上限件数（マージ済みの既存件数には加算）"
        required: false
        default: "9999"
      edinet_extract:
        description: "EDINET XBRL から財務データを抽出して financial_metrics.json を更新するか"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # GitHub cron uses UTC. JST Monday 08:00 = UTC Sunday 23:00.
    # Scheduled runs can be delayed by GitHub. Keep the job bounded for the free tier.
    - cron: "0 23 * * 0"

permissions:
  contents: write

concurrency:
  group: weekly-data-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_OPTIONS: --max-old-space-size=4096
      DATA_DOWNLOAD_LIMIT: ${{ github.event.inputs.download_limit || '220' }}
      INCLUDE_VOTE_PDFS: ${{ github.event.inputs.include_vote_pdfs || 'true' }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
      EDINET_FROM_INPUT: ${{ github.event.inputs.edinet_from || '' }}
      EDINET_TO_INPUT: ${{ github.event.inputs.edinet_to || '' }}
      EDINET_COMPANY_INPUT: ${{ github.event.inputs.edinet_company || '' }}
      EDINET_LIMIT: ${{ github.event.inputs.edinet_limit || '9999' }}
      EDINET_EXTRACT: ${{ github.event.inputs.edinet_extract || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run compliant public-source collection
        run: npm run collect:data

      - name: Discover EDINET annual reports (有価証券報告書)
        if: ${{ env.EDINET_API_KEY != '' }}
        run: |
          FROM_DATE="${EDINET_FROM_INPUT}"
          TO_DATE="${EDINET_TO_INPUT}"
          # デフォルト: 90日前〜今日（3月決算企業は6〜8月提出のため3ヶ月カバー）
          if [ -z "${FROM_DATE}" ]; then
            FROM_DATE=$(date -u -d "90 days ago" +%F)
          fi
          if [ -z "${TO_DATE}" ]; then
            TO_DATE=$(date -u +%F)
          fi
          EXTRA_ARGS=""
          if [ -n "${EDINET_COMPANY_INPUT}" ]; then
            EXTRA_ARGS="--company=${EDINET_COMPANY_INPUT}"
          fi
          echo "🔍 EDINET 探索期間: ${FROM_DATE} 〜 ${TO_DATE}"
          npm run edinet:discover -- --from=${FROM_DATE} --to=${TO_DATE} --limit=${EDINET_LIMIT} --delay=1500 ${EXTRA_ARGS}

      - name: Extract financials from EDINET XBRL
        if: ${{ env.EDINET_API_KEY != '' && env.EDINET_EXTRACT == 'true' }}
        run: |
          echo "📊 EDINET XBRL から財務データを抽出します..."
          npm run edinet:extract-financials -- --delay=2000
        env:
          EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}

      - name: Merge EDINET filing metadata into company sources
        if: ${{ env.EDINET_API_KEY != '' }}
        run: npm run edinet:merge-sources

      - name: Verify app build
        run: npm run build

      - name: Audit company fact coverage
        run: npm run audit:company-facts

      - name: Audit vote record quality
        run: npm run audit:vote-records

      - name: Commit collected data
        shell: bash
        run: |
          set -euxo pipefail
          add_if_exists() {
            for path in "$@"; do
              if compgen -G "$path" > /dev/null; then
                for match in $path; do
                  if git check-ignore -q "$match"; then
                    echo "Skip ignored path: $match"
                  else
                    git add "$match"
                  fi
                done
              else
                echo "Skip missing path: $path"
              fi
            done
          }
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged . || true
          git checkout -- data/generated/investor_opposition_records.json data/generated/*_cases.json 2>/dev/null || true
          add_if_exists "data/*.json"
          add_if_exists "data/generated/*_summary.json"
          add_if_exists "data/generated/download_manifest.json" "data/generated/source_registry.json" "data/generated/opposition_focus_companies.json" "data/generated/investor_opposition_summary.json"
          add_if_exists "data/generated/edinet_filings.json" "data/generated/edinet_download_manifest.json"
          add_if_exists "data/generated/company_fact_coverage.json"
          add_if_exists "data/generated/vote_record_quality_report.json"
          if [ -f "data/generated/opposition_records_by_investor/blackrock.json" ]; then
            git add -f "data/generated/opposition_records_by_investor/blackrock.json"
          fi
          while IFS= read -r file; do
            if [ -f "$file" ]; then
              bytes=$(wc -c < "$file")
              if [ "$bytes" -gt 90000000 ]; then
                echo "Unstage oversized generated file: $file ($bytes bytes)"
                git restore --staged "$file"
                git checkout -- "$file" 2>/dev/null || true
              fi
            fi
          done < <(git diff --cached --name-only)
          git status --short
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No collected data changes."
          else
            git commit -m "Update proxy vote data"
            git push
          fi
