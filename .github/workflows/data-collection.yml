name: Weekly data collection

on:
  workflow_dispatch:
    inputs:
      download_limit:
        description: "Maximum number of public source files to download"
        required: false
        default: "220"
      include_vote_pdfs:
        description: "Include vote result PDFs. Keep true for BlackRock; set false if free-minute usage grows."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # GitHub cron uses UTC. JST Monday 08:00 = UTC Sunday 23:00.
    # Scheduled runs can be delayed by GitHub. Keep the job bounded for the free tier.
    - cron: "0 23 * * 0"

permissions:
  contents: write

concurrency:
  group: weekly-data-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATA_DOWNLOAD_LIMIT: ${{ github.event.inputs.download_limit || '220' }}
      INCLUDE_VOTE_PDFS: ${{ github.event.inputs.include_vote_pdfs || 'true' }}
      EDINET_API_KEY: ${{ secrets.EDINET_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run compliant public-source collection
        run: npm run collect:data

      - name: Discover recent EDINET annual reports
        if: ${{ env.EDINET_API_KEY != '' }}
        run: |
          FROM_DATE=$(date -u -d "21 days ago" +%F)
          TO_DATE=$(date -u +%F)
          npm run edinet:discover -- --from=${FROM_DATE} --to=${TO_DATE} --limit=25 --delay=2000

      - name: Download recent EDINET documents
        if: ${{ env.EDINET_API_KEY != '' }}
        run: npm run edinet:download -- --limit=10 --type=1 --delay=2000

      - name: Verify app build
        run: npm run build

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git restore --staged . || true
          git checkout -- data/generated/investor_opposition_records.json data/generated/*_cases.json 2>/dev/null || true
          git add data/*.json
          git add data/generated/*_summary.json
          git add data/generated/download_manifest.json data/generated/source_registry.json data/generated/opposition_focus_companies.json data/generated/investor_opposition_summary.json
          git add data/generated/edinet_filings.json data/generated/edinet_download_manifest.json 2>/dev/null || true
          git add data/generated/pipeline_logs/*.json 2>/dev/null || true
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No collected data changes."
          else
            git commit -m "Update proxy vote data"
            git push
          fi
