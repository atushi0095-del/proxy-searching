name: Weekly data collection

on:
  workflow_dispatch:
    inputs:
      download_limit:
        description: "Maximum number of public source files to download"
        required: false
        default: "220"
      include_vote_pdfs:
        description: "Include vote result PDFs. Keep true for BlackRock; set false if free-minute usage grows."
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
  schedule:
    # GitHub cron uses UTC. JST Monday 08:00 = UTC Sunday 23:00.
    # Scheduled runs can be delayed by GitHub. Keep the job bounded for the free tier.
    - cron: "0 23 * * 0"

permissions:
  contents: write

concurrency:
  group: weekly-data-collection
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      DATA_DOWNLOAD_LIMIT: ${{ github.event.inputs.download_limit || '220' }}
      INCLUDE_VOTE_PDFS: ${{ github.event.inputs.include_vote_pdfs || 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run compliant public-source collection
        run: npm run collect:data

      - name: Verify app build
        run: npm run build

      - name: Commit collected data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/*.json data/generated/*.json data/generated/pipeline_logs/*.json
          if git diff --cached --quiet; then
            echo "No collected data changes."
          else
            git commit -m "Update proxy vote data"
            git push
          fi
